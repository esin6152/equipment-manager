<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장비 관리 시스템</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222538;
    --border: #2e3248;
    --accent: #4f7cff;
    --accent2: #7c5cff;
    --green: #2ecc8a;
    --yellow: #f5c842;
    --red: #ff5c5c;
    --gray: #8b8fa8;
    --text: #e8eaf6;
    --text2: #b0b3c8;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* HEADER */
  header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0px; z-index: 9;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-stats { display: flex; gap: 24px; }
  .stat-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border-radius: 20px;
    padding: 6px 14px; font-size: 13px; color: var(--text2);
  }
  .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .header-cat-stats {
    display: flex; flex-wrap: nowrap; gap: 6px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; /* Firefox */
  }
  .header-cat-stats::-webkit-scrollbar { display: none; }
  .cat-stat-row {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface2); border-radius: 10px;
    padding: 4px 8px; font-size: 11px; flex-shrink: 0;
  }
  .cat-stat-row .cat-name { color: var(--text2); font-weight: 600; }
  .cat-stat-item { display: flex; align-items: center; gap: 3px; color: var(--gray); font-size: 11px; }
  .cat-stat-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .cat-stat-item .num { font-weight: 700; }
  .cat-stat-item:hover { color: var(--text); }
  .cat-stat-item:hover .num { color: var(--text); }
  .cat-stat-row .cat-name:hover { opacity: 0.8; }

  /* TABS */
  .tabs {
    display: flex; gap: 0;
    padding: 0 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    align-items: center;
  }
  .tab {
    padding: 14px 12px; font-size: 13px; font-weight: 500;
    white-space: nowrap;
    color: var(--gray); cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text2); }

  /* MAIN */
  main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  /* 모바일에서 필터 줄바꿈 */
  .filter-break { display: none; }

  /* SECTION VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* CARD GRID */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .equipment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .equipment-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .equipment-card.in-use { border-left: 3px solid var(--yellow); }
  .equipment-card.available { border-left: 3px solid var(--green); }
  .equipment-card.maintenance { border-left: 3px solid var(--red); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .card-title { font-size: 15px; font-weight: 600; }
  .card-version { font-size: 11px; color: var(--gray); margin-top: 3px; }

  .status-badge {
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 20px; white-space: nowrap;
  }
  .status-badge.in-use { background: rgba(245,200,66,0.15); color: var(--yellow); }
  .status-badge.available { background: rgba(46,204,138,0.15); color: var(--green); }
  .status-badge.maintenance { background: rgba(255,92,92,0.15); color: var(--red); }

  .card-info { display: flex; flex-direction: column; gap: 8px; }
  .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
  .info-row .label { color: var(--gray); min-width: 52px; font-size: 12px; }
  .info-row .value { color: var(--text); }

  .card-actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn {
    flex: 1; padding: 8px; border-radius: 8px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text2); }
  .btn-danger { background: rgba(255,92,92,0.15); color: var(--red); }

  /* TIMELINE VIEW */
  .timeline-nav {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .timeline-nav button {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 6px 14px;
    cursor: pointer; font-size: 14px; transition: border-color 0.2s;
  }
  .timeline-nav button:hover { border-color: var(--accent); }
  .timeline-nav .month-label { font-size: 16px; font-weight: 700; min-width: 100px; text-align: center; }
  .timeline-scroll { overflow-x: auto; }
  .timeline-table { border-collapse: collapse; min-width: 100%; }
  .timeline-table th {
    font-size: 11px; color: var(--gray); font-weight: 500;
    padding: 6px 4px; text-align: center; white-space: nowrap;
    border-bottom: 1px solid var(--border); min-width: 28px;
  }
  .timeline-table th.today-col { color: var(--accent); font-weight: 700; }
  .timeline-table th.eq-col { text-align: left; padding-left: 12px; min-width: 160px; font-size: 12px; }
  .timeline-table td { padding: 3px 2px; }
  .timeline-table td.eq-name-cell {
    padding: 6px 12px; font-size: 13px; white-space: nowrap;
    border-right: 1px solid var(--border);
  }
  .timeline-table th.eq-col {
    background: var(--surface);
  }
  @media (min-width: 768px) {
    .timeline-table td.eq-name-cell {
      position: sticky; left: 0; z-index: 2;
      background: var(--surface);
    }
    .timeline-table th.eq-col {
      position: sticky; left: 0; z-index: 3;
    }
  }
  .eq-name-cell .eq-ver { font-size: 10px; color: var(--gray); }
  .day-cell {
    width: 28px; height: 32px; border-radius: 4px;
    background: var(--surface2); border: 1px solid transparent;
    cursor: default; transition: opacity 0.2s;
  }
  .day-cell.used { background: rgba(245,200,66,0.25); border-color: rgba(245,200,66,0.4); }
  .day-cell.maint { background: rgba(255,92,92,0.2); border-color: rgba(255,92,92,0.4); }
  .day-cell.free { background: rgba(46,204,138,0.08); }
  .day-cell.today { outline: 2px solid var(--accent); outline-offset: -2px; }
  .day-cell.weekend { opacity: 0.6; }

  /* HISTORY TABLE */
  .history-table { width: 100%; border-collapse: collapse; }
  .history-table th {
    text-align: left; padding: 12px 16px; font-size: 12px;
    color: var(--gray); border-bottom: 1px solid var(--border);
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .history-table td {
    padding: 14px 16px; font-size: 13px; color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .history-table tr:hover td { background: var(--surface2); }
  .type-badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 12px;
  }
  .type-use { background: rgba(79,124,255,0.15); color: var(--accent); }
  .type-repair { background: rgba(255,92,92,0.15); color: var(--red); }
  .type-check { background: rgba(124,92,255,0.15); color: var(--accent2); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 90%; max-width: 480px;
    max-height: 85vh; overflow-y: auto;
  }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--gray); margin-bottom: 6px; font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-size: 14px; outline: none; font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.8) brightness(1.5);
    cursor: pointer;
    opacity: 0.8;
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { padding: 11px; font-size: 14px; }

  /* SECTION TITLE */
  .section-title {
    font-size: 20px; font-weight: 700; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .add-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 9px 18px; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .add-btn:hover { opacity: 0.85; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--gray);
    font-size: 14px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
    align-items: center;
  }
  .filter-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; color: var(--text);
    font-size: 13px; outline: none; font-family: inherit;
    transition: border-color 0.2s;
  }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--gray); }
  .filter-select { cursor: pointer; padding: 6px 10px; font-size: 12px; }
  .filter-reset {
    background: none; border: 1px solid var(--border); color: var(--gray);
    border-radius: 8px; padding: 8px 12px; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-reset:hover { border-color: var(--accent); color: var(--text); }
  .filter-count { font-size: 12px; color: var(--gray); margin-left: 4px; }

  .status-filter-btn {
    padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text2);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .status-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .status-filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  /* 체크박스 드롭다운 */
  .chk-dropdown-wrap { position: relative; }
  .chk-dropdown {
    display: none; position: absolute; top: 100%; left: 0; z-index: 50;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; min-width: 160px; max-height: 200px;
    overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    padding: 6px 0; margin-top: 4px;
  }
  .chk-dropdown.open { display: block; }
  .chk-dropdown label {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; font-size: 13px; color: var(--text2);
    cursor: pointer; transition: background 0.15s;
  }
  .chk-dropdown label:hover { background: var(--surface2); }
  .chk-dropdown input[type=checkbox] { cursor: pointer; width:14px; height:14px; }

  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 16px;
  }

  /* RESERVATION */
  .reserve-btn {
    width: 100%; margin-top: 12px; padding: 8px; border-radius: 8px;
    border: 1px dashed var(--accent); background: rgba(79,124,255,0.08);
    color: var(--accent); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .reserve-btn:hover { background: rgba(79,124,255,0.18); }
  .reservation-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; background: rgba(79,124,255,0.08);
    border: 1px solid rgba(79,124,255,0.25); border-radius: 8px;
    margin-top: 6px; font-size: 12px;
  }
  .reservation-item .res-info { display: flex; flex-direction: column; gap: 2px; }
  .reservation-item .res-name { color: var(--text); font-weight: 600; }
  .reservation-item .res-date { color: var(--gray); }
  .reservation-item .res-del {
    background: none; border: none; color: var(--gray);
    cursor: pointer; font-size: 14px; padding: 2px 6px;
    border-radius: 4px; transition: color 0.2s;
  }
  .reservation-item .res-del:hover { color: var(--red); }

  /* DOT MENU */
  .dot-menu-wrap { position: relative; flex-shrink: 0; }
  .dot-menu-btn {
    background: none; border: none; color: var(--gray);
    cursor: pointer; font-size: 18px; padding: 2px 8px;
    border-radius: 6px; line-height: 1; transition: background 0.2s;
    letter-spacing: 1px;
  }
  .dot-menu-btn:hover { background: var(--surface2); color: var(--text); }
  .dot-menu-popup {
    display: none; position: absolute; right: 0; top: 100%;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; min-width: 110px; z-index: 50;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); overflow: hidden;
  }
  .dot-menu-popup.open { display: block; }
  .dot-menu-item {
    display: block; width: 100%; padding: 10px 14px;
    font-size: 13px; font-weight: 500; border: none;
    background: none; cursor: pointer; text-align: left;
    transition: background 0.15s; color: var(--text2);
  }
  .dot-menu-item:hover { background: var(--surface2); }
  .dot-menu-item.danger { color: var(--red); }
  .dot-menu-item.danger:hover { background: rgba(255,92,92,0.1); }
  .res-label {
    font-size: 11px; color: var(--accent); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; margin-top: 10px; margin-bottom: 4px;
  }
  /* timeline reserved color */
  .day-cell.reserved { background: rgba(79,124,255,0.2); border-color: rgba(79,124,255,0.4); }
  .day-cell.urgent {
    background: repeating-linear-gradient(
      45deg,
      rgba(255,92,92,0.25),
      rgba(255,92,92,0.25) 3px,
      rgba(245,200,66,0.25) 3px,
      rgba(245,200,66,0.25) 6px
    );
    border-color: rgba(255,92,92,0.6);
    border-width: 2px;
  }

  /* CATEGORY TABS */
  .cat-tabs {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; align-items: center;
  }
  .cat-tab {
    padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
    color: var(--text2); transition: all 0.2s; white-space: nowrap;
  }
  .cat-tab:hover { border-color: var(--accent); color: var(--text); }
  .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .cat-tab .cat-count {
    display: inline-block; background: rgba(255,255,255,0.2);
    border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 5px;
  }
  .cat-tab:not(.active) .cat-count { background: var(--surface); color: var(--gray); }
  .cat-manage-btn {
    background: none; border: 1px dashed var(--border); border-radius: 20px;
    color: var(--gray); font-size: 13px; padding: 7px 14px;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .cat-manage-btn:hover { border-color: var(--accent); color: var(--accent); }
  /* cat manage list */
  .cat-manage-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .cat-manage-row:last-child { border-bottom: none; }
  .cat-manage-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; color: var(--text);
    font-size: 14px; outline: none;
  }
  .cat-manage-row input:focus { border-color: var(--accent); }
  .cat-manage-row .eq-cnt { font-size: 12px; color: var(--gray); min-width: 40px; text-align:right; }

  /* ── 모바일 ── */
  @media (max-width: 767px) {
    .filter-break { display: block; width: 100%; height: 0; }
    main { padding: 8px 8px; }
    .section-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
    .filter-bar { gap: 5px; margin-bottom: 6px; }
    .cat-tabs { gap: 4px; margin-bottom: 6px; }
    .cat-tab { padding: 3px 8px !important; font-size: 11px !important; border-radius: 14px; line-height: 1.4; }
    .cat-tab .cat-count { padding: 0 4px !important; font-size: 10px !important; margin-left: 3px; }
    .cat-manage-btn { font-size: 11px !important; padding: 3px 8px !important; line-height: 1.4; }
    .status-filter-btn { padding: 2px 7px !important; font-size: 11px !important; line-height: 1.4; }
    /* 드롭다운을 상태필터와 한 줄로 */
    .filter-break { display: none !important; }
    .filter-bar { flex-wrap: wrap; }
    .filter-input { padding: 2px 7px !important; font-size: 11px !important; line-height: 1.4; }
    .filter-reset { padding: 2px 7px !important; font-size: 11px !important; line-height: 1.4; }
    .add-btn { padding: 5px 11px !important; font-size: 12px !important; }
  }

  /* STICKY FILTER 공통 */
  .dashboard-sticky-filter,
  .timeline-sticky-filter,
  .history-sticky-filter {
    position: sticky;
    top: 93px;
    z-index: 8;
    background: var(--bg);
    padding-top: 8px;
    margin: -8px -32px 0;
    padding-left: 32px;
    padding-right: 32px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  @media (max-width: 767px) {
    .dashboard-sticky-filter,
    .timeline-sticky-filter,
    .history-sticky-filter {
      top: 88px;
      margin: -8px -8px 0;
      padding-left: 8px;
      padding-right: 8px;
    }
  }


</style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="loading-overlay" style="position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite"></div>
  <div style="color:var(--text2);font-size:14px">데이터 불러오는 중...</div>
</div>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
// ================================================================
// Google Sheets 연동 설정
// Apps Script 배포 후 아래 URL을 교체하세요
// ================================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqhz11YlxjeLPW376K9vox_aaDFXU3cxjahxTUZ482-BcT-xtoO19m-EIo1L2ENnQOWg/exec';
const USE_SHEETS = SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE';

// ── 데이터 로드 (앱 시작 시) ─────────────────────
function toDateStr(val) {
  if (!val) return '';
  if (typeof val === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  const d = new Date(val);
  if (isNaN(d)) return String(val);
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

// 로컬 시간 기준 날짜 문자열 (timezone 보정)
function localDateStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

async function loadFromSheets(isAutoRefresh = false) {
  if (!USE_SHEETS) {
    document.getElementById('loading-overlay').style.display = 'none';
    return;
  }
  if (!isAutoRefresh) showSyncStatus('불러오는 중...');
  try {
    const res = await fetch(SCRIPT_URL);
    const json = await res.json();
    if (json.ok) {
      equipments   = json.data.equipments.map(e => ({ ...e, id: Number(e.id), mountedOn: e.mountedOn === '' ? '' : Number(e.mountedOn), until: toDateStr(e.until) }));
      reservations = json.data.reservations.map(r => ({ ...r, id: Number(r.id), eqId: Number(r.eqId), start: toDateStr(r.start), end: toDateStr(r.end) }));
      histories    = json.data.histories.map(h => ({ ...h, id: Number(h.id), eqId: Number(h.eqId), date: toDateStr(h.date) }));
      extraCategories = json.data.categories || [];
      categoryMeta = json.data.categoryMeta || {};
      nextEqId   = equipments.length   ? Math.max(...equipments.map(e=>e.id))   + 1 : 1;
      nextResId  = reservations.length ? Math.max(...reservations.map(r=>r.id)) + 1 : 1;
      nextHistId = histories.length    ? Math.max(...histories.map(h=>h.id))    + 1 : 1;
      renderDashboard();
      renderHistory();
      if (!isAutoRefresh) showSyncStatus('✅ 동기화 완료', 2000);
    }
  } catch(e) {
    showSyncStatus('⚠️ 불러오기 실패', 3000);
  } finally {
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

// ── 단건 저장 ─────────────────────────────────────
async function saveToSheets(table, record) {
  if (!USE_SHEETS) return;
  lastSaveTime = Date.now();
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'save', table, record }),
    });
  } catch(e) { console.warn('save failed', e); }
}

// ── 단건 삭제 ─────────────────────────────────────
async function deleteFromSheets(table, id) {
  if (!USE_SHEETS) return;
  lastSaveTime = Date.now();
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', table, id }),
    });
  } catch(e) { console.warn('delete failed', e); }
}

async function saveAllEquipments() {
  if (!USE_SHEETS) return;
  lastSaveTime = Date.now();
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveAll', table: 'equipments', records: equipments }),
    });
  } catch(e) { console.warn('saveAll failed', e); }
}

// ── 상태 표시 ─────────────────────────────────────
function showSyncStatus(msg, hideAfter) {
  let el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'inline';
  el.style.opacity = '1';
  if (hideAfter) setTimeout(() => { el.style.opacity = '0'; el.style.display = 'none'; }, hideAfter);
}


let equipments = [];
let histories = [];
let reservations = [];

let nextResId = 1;
let nextEqId = 1;
let nextHistId = 1;

// ── 일정 뷰 셀 팝업 ──────────────────────────────
function showCellPopup(el) {
  const data = JSON.parse(decodeURIComponent(el.dataset.popup));
  let title = '';
  let body = '';
  let actionBtns = '';

  if (data.type === 'use') {
    title = '🟡 사용중';
    body = `
      <div class="info-row"><span class="label">목적</span><span class="value">${data.purpose || '-'}</span></div>
      <div class="info-row"><span class="label">사용자</span><span class="value">${data.user || '-'}</span></div>
      <div class="info-row"><span class="label">사용 장소</span><span class="value">${data.location || '-'}</span></div>
      <div class="info-row"><span class="label">반납일</span><span class="value">${data.until || '-'}</span></div>`;
    if (data.eqId) {
      actionBtns = `<button onclick="closeModal('modal-cell-info');openReserve(${data.eqId})" style="display:block;width:100%;margin-top:12px;padding:9px;background:rgba(79,124,255,0.15);color:#4f7cff;border:1px solid rgba(79,124,255,0.4);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">+ 예약 추가</button>`;
    }
  } else if (data.type === 'res' || data.type === 'urgent') {
    title = `📅 예약 ${data.items.length}건`;
    body = data.items.map((r, idx) => `
      <div style="padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px">
        <div class="info-row"><span class="label">목적</span><span class="value">${r.purpose || '-'}</span></div>
        <div class="info-row"><span class="label">예약자</span><span class="value">${r.user || '-'}</span></div>

function showConfirm(title, msg, onOk, transferLabel, onTransfer) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  const okBtn = document.getElementById('confirm-ok-btn');
  const transferBtn = document.getElementById('confirm-transfer-btn');

  okBtn.textContent = transferLabel ? '반납만' : '확인';
  okBtn.onclick = () => { closeModal('modal-confirm'); onOk(); };

  if (transferLabel && onTransfer) {
    transferBtn.textContent = transferLabel;
    transferBtn.style.display = 'block';
    transferBtn.onclick = () => { closeModal('modal-confirm'); onTransfer(); };
  } else {
    transferBtn.style.display = 'none';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['dashboard','timeline','history'][i] === tab);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (tab === 'timeline') renderTimeline();
  if (tab === 'history') renderHistory();
}

  const cats = [...new Set(equipments.map(e => e.category).filter(Boolean))].sort();
  document.getElementById('header-cat-stats').innerHTML = cats.map(cat => {
    const catEqs = equipments.filter(e => e.category === cat);

let extraCategories = []; // 장비 없이 등록된 품목
let categoryMeta = {}; // { 'SIRIUS V2': { isModule: true }, ... }
let activeCat = '전체';
let reservingEqId = null;
let editingResId = null;



function getAllCategories() {
  const fromEquipments = [...new Set(equipments.map(e => e.category).filter(Boolean))];
  return [...new Set([...extraCategories, ...fromEquipments])].sort();
}

function renderCatTabs() {
  const cats = ['전체', ...getAllCategories()];
  if (activeCat !== '전체' && !cats.includes(activeCat)) activeCat = '전체';
  const tabsHtml = cats.map(cat => {
    const count = cat === '전체' ? equipments.length : equipments.filter(e => e.category === cat).length;
    const color = cat !== '전체' ? getCatColor(cat) : '';
    const isActive = activeCat === cat;
    const style = cat !== '전체'
      ? isActive ? `background:${color};border-color:${color};color:#fff` : `border-color:${color};color:${color}`
      : '';
    return `<div class="cat-tab ${isActive ? 'active' : ''}" style="${style}" onclick="selectCat('${cat}')">
      ${cat}<span class="cat-count">${count}</span>
    </div>`;
  }).join('');
  document.getElementById('cat-tabs').innerHTML = tabsHtml
    + `<button class="cat-manage-btn" onclick="openCatManage()">⚙️ 품목 관리</button>`;
}

let activeStatusFilters = new Set();
let activeUserFilters = new Set();
let activeLocationFilters = new Set();

function filterByStat(cat, status) {
  switchTab('dashboard');
  activeCat = cat === '' ? '전체' : cat;
  activeStatusFilters.clear();
  activeUserFilters.clear();
  activeLocationFilters.clear();
  if (status) activeStatusFilters.add(status);
  ['available','in-use','maintenance'].forEach(s => {
    const btn = document.getElementById('fbtn-' + s);
    if (btn) btn.classList.toggle('active', activeStatusFilters.has(s));
  });
  updateUserLabel();
  updateLocationLabel();
  refreshFilterOptions();
  renderCatTabs();
  applyFilters();
}

function toggleStatusFilter(status) {
  if (activeStatusFilters.has(status)) activeStatusFilters.delete(status);
  else activeStatusFilters.add(status);
  ['available','in-use','maintenance'].forEach(s => {
    const btn = document.getElementById(`fbtn-${s}`);
    if (btn) btn.classList.toggle('active', activeStatusFilters.has(s));
  });
  applyFilters();
}

function selectCat(cat) {
  activeCat = cat;
  resetFilters();
}

function toggleChkDropdown(id) {
  document.querySelectorAll('.chk-dropdown').forEach(d => {
    if (d.id !== id) d.classList.remove('open');
  });
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.chk-dropdown-wrap')) {
    document.querySelectorAll('.chk-dropdown').forEach(d => d.classList.remove('open'));
  }
});

function toggleUserFilter(user) {
  if (activeUserFilters.has(user)) activeUserFilters.delete(user);
  else activeUserFilters.add(user);
  updateUserLabel();
  applyFilters();
}

function toggleLocationFilter(loc) {
  if (activeLocationFilters.has(loc)) activeLocationFilters.delete(loc);
  else activeLocationFilters.add(loc);
  updateLocationLabel();
  applyFilters();
}

function updateUserLabel() {
  const el = document.getElementById('user-filter-label');
  if (el) el.textContent = activeUserFilters.size > 0 ? `사용자 ${activeUserFilters.size}개` : '전체 사용자';
}

function updateLocationLabel() {
  const el = document.getElementById('location-filter-label');
  if (el) el.textContent = activeLocationFilters.size > 0 ? `장소 ${activeLocationFilters.size}개` : '전체 장소';
}

function refreshFilterOptions() {
  const users = [...new Set(equipments.map(e => e.user).filter(Boolean))].sort();
  const locations = [...new Set(equipments.map(e => e.location).filter(Boolean))].sort();

  const userList = document.getElementById('user-chk-list');
  if (userList) userList.innerHTML = users.map(u => `
    <label>
      <input type="checkbox" ${activeUserFilters.has(u) ? 'checked' : ''} onchange="toggleUserFilter('${u}')">
      ${u}
    </label>`).join('');

  const locList = document.getElementById('location-chk-list');
  if (locList) locList.innerHTML = locations.map(l => `
    <label>
      <input type="checkbox" ${activeLocationFilters.has(l) ? 'checked' : ''} onchange="toggleLocationFilter('${l}')">
      ${l}
    </label>`).join('');
}

// ── 필터 적용 ─────────────────────────────────────
function applyFilters() {
  const base = activeCat === '전체' ? equipments : equipments.filter(e => e.category === activeCat);
  const filtered = base.filter(eq => {
    if (activeStatusFilters.size > 0 && !activeStatusFilters.has(eq.status)) return false;
    if (activeUserFilters.size > 0 && !activeUserFilters.has(eq.user)) return false;
    if (activeLocationFilters.size > 0 && !activeLocationFilters.has(eq.location)) return false;
    return true;
  });
  const hasFilter = activeStatusFilters.size > 0 || activeUserFilters.size > 0 || activeLocationFilters.size > 0;
  document.getElementById('filter-count').textContent = hasFilter ? `${filtered.length} / ${base.length}대` : '';
  renderDashboard(filtered);
}

function resetFilters() {
  activeStatusFilters.clear();
  activeUserFilters.clear();
  activeLocationFilters.clear();
  ['available','in-use','maintenance'].forEach(s => {
    const btn = document.getElementById(`fbtn-${s}`);
    if (btn) btn.classList.remove('active');
  });
  updateUserLabel();
  updateLocationLabel();
  refreshFilterOptions();
  document.getElementById('filter-count').textContent = '';
  renderDashboard();
}


// ── 품목별 색상 ───────────────────────────────────
const CAT_COLORS = {
  'SIRIUS WEARABLE': '#7c5cff',
  'SIRIUS V2':       '#2ecc8a',
  'SIRIUS WING2':    '#4f7cff',
};
const CAT_COLOR_PALETTE = [
  '#f5c842', '#ff7c5c', '#ff5caa', '#00bcd4', '#8bc34a', '#ff9800', '#e91e63', '#9c27b0',
];

function getCatColor(cat) {
  if (!cat) return '#8b8fa8';
  if (CAT_COLORS[cat]) return CAT_COLORS[cat];
  // 모든 카테고리 중 고정 색상 없는 것들을 추가 순서대로 정렬
  const allCats = getAllCategories();
  let paletteIdx = 0;
  for (const c of allCats) {
    if (!['SIRIUS WEARABLE','SIRIUS V2','SIRIUS WING2'].includes(c) && !CAT_COLORS[c]) {
      CAT_COLORS[c] = CAT_COLOR_PALETTE[paletteIdx % CAT_COLOR_PALETTE.length];
      paletteIdx++;
    }
  }
  return CAT_COLORS[cat] || '#8b8fa8';
}

function sortByPairs(list) {
  const result = [];
  const used = new Set();

  list.forEach(eq => {
    if (used.has(eq.id)) return;
    if (isModuleCategory(eq.category) && eq.mountedOn) {
      result.push(eq); used.add(eq.id);
      const host = list.find(e => e.id === eq.mountedOn);
      if (host && !used.has(host.id)) { result.push(host); used.add(host.id); }
    } else if (!isModuleCategory(eq.category)) {
      const module = list.find(e => isModuleCategory(e.category) && e.mountedOn === eq.id && !used.has(e.id));
      if (module) { result.push(module); used.add(module.id); }
      result.push(eq); used.add(eq.id);
    } else {
      result.push(eq); used.add(eq.id);
    }
  });
  return result;
}

function renderDashboard(list) {
  updateStats();
  renderCatTabs();
  refreshFilterOptions();
  const catFiltered = activeCat === '전체' ? equipments : equipments.filter(e => e.category === activeCat);
  const filtered = sortByPairs(list !== undefined ? list : catFiltered);
  const grid = document.getElementById('equipment-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">조건에 맞는 장비가 없습니다</div>';
    return;
  }
  grid.innerHTML = filtered.map(eq => {
    const statusLabel = { 'available': '대기중', 'in-use': '사용중', 'maintenance': '수리중' }[eq.status];

    // 장착 정보 계산
    const mountRow = (() => {
      if (isModuleCategory(eq.category)) {
        if (eq.mountedOn) {
          const target = equipments.find(e => e.id === eq.mountedOn);
          if (target) {
            const color = getCatColor(target.category);
            return `<div class="info-row"><span class="label">장착 상태</span><span class="value"><span style="color:${color};font-weight:700">${target.category}</span> ${target.name}</span></div>`;
          }
        }
        return `<div class="info-row"><span class="label">장착 상태</span><span class="value" style="color:var(--gray)">미장착</span></div>`;
      } else {
        const module = equipments.find(e => isModuleCategory(e.category) && e.mountedOn && e.mountedOn === eq.id);
        if (module) return `<div class="info-row"><span class="label">장착된 모듈</span><span class="value" style="color:${getCatColor(module.category)};font-weight:700">${module.category ? module.category + ' · ' : ''}<span style="font-weight:700">${module.serial || module.name}</span></span></div>`;
        return '';
      }
    })();

    const infoRows = eq.status === 'in-use'
      ? `<div class="info-row"><span class="label">사용자</span><span class="value">${eq.user}</span></div>
         <div class="info-row"><span class="label">목적</span><span class="value">${eq.purpose}</span></div>
         <div class="info-row"><span class="label">반납일</span><span class="value">${eq.until || '무기한'}</span></div>
         <div class="info-row"><span class="label">사용 장소</span><span class="value">${eq.location}</span></div>
         ${eq.memo ? `<div class="info-row"><span class="label">메모</span><span class="value">${eq.memo}</span></div>` : ''}
         ${mountRow}`
      : `<div class="info-row"><span class="label">현재 위치</span><span class="value">${eq.location}</span></div>
         ${mountRow}
         ${eq.memo ? `<div class="info-row"><span class="label">메모</span><span class="value">${eq.memo}</span></div>` : ''}`;

    const today = localDateStr(new Date());
    const eqRes = reservations.filter(r => r.eqId === eq.id).sort((a,b) => a.start.localeCompare(b.start));

    const resHtml = eqRes.length
      ? `<div class="res-label">📅 예약 ${eqRes.length}건</div>`
        + eqRes.map(r => {
          // 수리중엔 바로 적용 버튼 숨김 (수리 완료 후 활성화)
          const canStart = eq.status === 'available';
          const inUseOverlap = eq.status === 'in-use' && eq.until && r.start <= eq.until;
          const resOverlap = eqRes.some(other => other.id !== r.id && !(r.end < other.start || r.start > other.end));
          const isOverlap = inUseOverlap || resOverlap;

          const urgentBadge = isOverlap ? `<span style="color:#f5c842;font-size:11px;font-weight:700">⚠️ 겹침</span>` : '';
          const itemStyle = isOverlap
            ? 'border-color:rgba(245,200,66,0.6);background:rgba(245,200,66,0.08)'
            : canStart ? 'border-color:var(--green);background:rgba(46,204,138,0.08)' : '';
          const directBtn = canStart
            ? `<button style="margin-top:8px;display:block;width:100%;padding:7px;font-size:12px;font-weight:600;background:rgba(79,124,255,0.15);color:#4f7cff;border:1px solid rgba(79,124,255,0.4);border-radius:8px;cursor:pointer" onclick="directRent(${r.id})">▶ 바로 적용</button>`
            : '';
          return `<div class="reservation-item" style="${itemStyle}">
            <div class="res-info" style="flex:1">
              <div style="display:flex;align-items:center;gap:6px">
                ${r.purpose ? `<span class="res-name">${r.purpose}</span>` : ''}
                <span style="color:var(--gray);font-size:11px">${r.user}</span>
                ${urgentBadge}
              </div>
              <span class="res-date">${r.start} ~ ${r.end}</span>
              ${directBtn}
            </div>
            <div class="dot-menu-wrap">
              <button class="dot-menu-btn" onclick="toggleDotMenu(event, 'res-menu-${r.id}')">⋮</button>
              <div class="dot-menu-popup" id="res-menu-${r.id}">
                <button class="dot-menu-item" onclick="closeDotMenus();editReservation(${r.id})">✎ 편집</button>
                <button class="dot-menu-item danger" onclick="closeDotMenus();deleteReservation(${r.id})">✕ 삭제</button>
              </div>
            </div>
          </div>`;
        }).join('')
      : '';

    // 버튼: 사용중 → 반납 / 수리중 → 수리 완료
    const returnBtn = eq.status === 'in-use'
      ? `<button onclick="returnEquipment(${eq.id})" style="display:block;width:100%;margin-top:10px;padding:9px;font-size:13px;font-weight:600;background:rgba(255,92,92,0.12);color:#ff5c5c;border:1px solid rgba(255,92,92,0.3);border-radius:8px;cursor:pointer">↩ 반납</button>`
      : eq.status === 'maintenance'
      ? `<button onclick="completeInspection(${eq.id})" style="display:block;width:100%;margin-top:10px;padding:9px;font-size:13px;font-weight:600;background:rgba(255,124,92,0.12);color:#ff7c5c;border:1px solid rgba(255,124,92,0.3);border-radius:8px;cursor:pointer">🔧 대기중으로 변경하기</button>`
      : '';

    return `
      <div class="equipment-card ${eq.status}" data-eqid="${eq.id}">
        <div class="card-click-area" onclick="openDetail(${eq.id})" style="cursor:pointer">
          <div class="card-header">
            <div>
              <div class="card-version" style="font-size:15px">${eq.category ? `<span style="color:${getCatColor(eq.category)};font-weight:700">${eq.category}</span> · ` : ''}<span style="color:var(--text)">${eq.name}</span> · <span style="${isModuleCategory(eq.category) ? 'font-weight:700' : ''}">${eq.serial}</span></div>
              <div class="card-version" style="margin-top:1px">${eq.version}</div>
            </div>
            <div class="status-badge ${eq.status}">${statusLabel}</div>
          </div>
          <div class="card-info">${infoRows}</div>
        </div>
        ${returnBtn}
        ${resHtml}
        <button class="reserve-btn" onclick="openReserve(${eq.id})">+ 예약 추가</button>
      </div>`;
  }).join('');
}

function renderCalendar() {
  const today = new Date();
  const year = timelineYear;
  const month = timelineMonth;
  document.getElementById('month-label-cal').textContent = `${year}년 ${month + 1}월`;
  const filteredEqs = timelineCat === '전체' ? equipments : equipments.filter(e => e.category === timelineCat);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const days = [];
  for (let d = 1; d <= daysInMonth; d++) days.push(new Date(year, month, d));
  const firstDow = new Date(year, month, 1).getDay();
  const weeks = [];
  let week = Array(firstDow).fill(null);
  days.forEach(d => {
    week.push(d);
    if (week.length === 7) { weeks.push(week); week = []; }
  });
  if (week.length) { while (week.length < 7) week.push(null); weeks.push(week); }
  const dayNames = ['일','월','화','수','목','금','토'];

  // 캘린더는 사용중이거나 예약있는 장비만 표시
  // 캘린더: 사용중(반납일 있음) + 예약있는 장비만 표시 (무기한 제외)
  const calEqs = filteredEqs.filter(eq =>
    (eq.status === 'in-use' && eq.until) ||
    reservations.some(r => r.eqId === eq.id)
  );

  function getEventsForDay(dObj) {
    if (!dObj) return [];
    const dStr = localDateStr(dObj);
    const events = [];
    calEqs.forEach(eq => {
      // 사용중 (반납일 있는 경우만)
      if (eq.status === 'in-use' && eq.until) {
        const start = new Date(); start.setHours(0,0,0,0);
        const until = new Date(eq.until); until.setHours(23,59,59);
        if (dObj >= start && dObj <= until) {
          events.push({ popupData: { type:'use', purpose: eq.purpose, user: eq.user, location: eq.location, until: eq.until }, label: `${eq.user} · ${eq.purpose || eq.name}`, color: 'rgba(245,200,66,0.5)', border: getCatColor(eq.category) });
        }
      }
      // 예약
      const allRes = reservations.filter(r => r.eqId === eq.id && dStr >= r.start && dStr <= r.end);
      const isOverlap = allRes.length > 1;
      allRes.forEach(r => {
        const pd = { type: isOverlap ? 'urgent' : 'res', items: allRes.map(x => ({ purpose: x.purpose, user: x.user, location: x.location, start: x.start, end: x.end })) };
        events.push({ resId: r.id, eqId: eq.id, popupData: { type: isOverlap ? 'urgent' : 'res', resId: r.id, eqId: eq.id, items: allRes.map(x => ({ purpose: x.purpose, user: x.user, location: x.location, start: x.start, end: x.end })) }, label: `${r.purpose || r.user} (${r.user})`, color: isOverlap ? 'rgba(255,92,92,0.5)' : 'rgba(79,124,255,0.5)', border: getCatColor(eq.category) });
      });
    });
    return events;
  }

  const todayStr = localDateStr(today);
  const weekRows = weeks.map(week => {
    const cells = week.map((d, i) => {
      if (!d) return `<div style="min-height:60px;background:rgba(255,255,255,0.02);border-radius:6px"></div>`;
      const isToday = d.toDateString() === today.toDateString();
      const isWeekend = i === 0 || i === 6;
      const isPast = localDateStr(d) < todayStr && !isToday;
      const events = getEventsForDay(d);
      const dStr = localDateStr(d);

      const evHtml = events.slice(0,3).map(ev => {
        return `<div data-popup="${encodeURIComponent(JSON.stringify({...ev.popupData, resId: ev.resId}))}" onclick="event.stopPropagation();showCellPopup(this)"
          style="font-size:10px;padding:2px 4px;margin-bottom:1px;border-radius:3px;background:${ev.color};color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-left:2px solid ${ev.border};line-height:1.4">${ev.label}</div>`;
      }).join('');
      const more = events.length > 3 ? `<div style="font-size:10px;color:var(--gray);padding:1px 3px">+${events.length-3}</div>` : '';

      if (isPast) {
        return `<div style="min-height:60px;background:rgba(255,255,255,0.02);border-radius:6px;padding:4px;border:1px solid transparent;opacity:0.5">
          <div style="font-size:11px;color:${isWeekend?(i===0?'#ff5c5c':'#4f7cff'):'var(--text2)'};margin-bottom:3px">${d.getDate()}</div>
          ${evHtml}${more}
        </div>`;
      }

      return `<div onclick="event.stopPropagation();showCalEmptyPopup('${dStr}')" style="min-height:60px;background:${isToday?'rgba(79,124,255,0.1)':'var(--surface2)'};border-radius:6px;padding:4px;border:1px solid ${isToday?'var(--accent)':'transparent'};cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-size:11px;font-weight:${isToday?'700':'500'};color:${isWeekend?(i===0?'#ff5c5c':'#4f7cff'):(isToday?'var(--accent)':'var(--text2)')}">${d.getDate()}</span>
          <span style="font-size:10px;color:var(--gray);opacity:0.4">+</span>
        </div>
        ${evHtml}${more}
      </div>`;
    }).join('');
    return `<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;margin-bottom:2px">${cells}</div>`;
  }).join('');

  document.getElementById('calendar-body').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;margin-bottom:4px">
      ${dayNames.map((d,i) => `<div style="text-align:center;font-size:11px;color:${i===0?'#ff5c5c':i===6?'#4f7cff':'var(--gray)'};padding:6px 0;font-weight:600">${d}</div>`).join('')}
    </div>
    ${weekRows}`;
}

function changeMonth(delta) {
  timelineMonth += delta;
  if (timelineMonth < 0) { timelineMonth = 11; timelineYear--; }
  if (timelineMonth > 11) { timelineMonth = 0; timelineYear++; }
  renderTimeline();
}

function renderTimeline() {
  renderTimelineCatTabs();
  if (timelineView === 'cal') {
    renderCalendar();
    return;
  }
  document.getElementById('timeline-grid-view').style.display = 'block';
  document.getElementById('timeline-cal-view').style.display = 'none';
  const today = new Date();
  const year = timelineYear;
  const month = timelineMonth;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  document.getElementById('month-label').textContent = `${year}년 ${month + 1}월`;

  const days = [];
  for (let d = 1; d <= daysInMonth; d++) days.push(new Date(year, month, d));

  // 품목 필터 적용
  const filteredEqs = timelineCat === '전체' ? equipments : equipments.filter(e => e.category === timelineCat);

  // 헤더
  let thead = '<thead><tr><th class="eq-col">장비</th>';
  days.forEach(d => {
    const isToday = d.toDateString() === today.toDateString();
    const dayNames = ['일','월','화','수','목','금','토'];
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    thead += `<th class="${isToday ? 'today-col' : ''}" style="${isWeekend ? 'opacity:0.5' : ''}">${d.getDate()}<br><span style="font-size:9px">${dayNames[d.getDay()]}</span></th>`;
  });
  thead += '</tr></thead>';

  // 바디
  let tbody = '<tbody>';
  filteredEqs.forEach(eq => {
    tbody += `<tr><td class="eq-name-cell"><span style="color:${getCatColor(eq.category)};font-weight:600">${eq.category}</span> · ${eq.name}${eq.serial ? ' · ' + eq.serial : ''}</td>`;
    days.forEach(d => {
      const isToday = d.toDateString() === today.toDateString();
      const isWeekend = d.getDay() === 0 || d.getDay() === 6;
      const dStr = localDateStr(d);
      let cls = 'day-cell';

      // 현재 사용중 구간인지 (until 없으면 무기한)
      const inUseNow = eq.status === 'in-use' && (() => {
        if (!eq.until) return true; // 무기한
        const start = new Date(); start.setHours(0,0,0,0);
        const until = new Date(eq.until); until.setHours(23,59,59);
        return d >= start && d <= until;
      })();

      // 수리중
      const isMaint = eq.status === 'maintenance';

      // 해당 날짜에 걸친 예약 목록
      const dayRes = reservations.filter(r => r.eqId === eq.id && dStr >= r.start && dStr <= r.end);

      if (isMaint) {
        cls += ' maint';
      } else if (inUseNow) {
        // 사용중 구간 + 예약도 겹치면 urgent
        if (dayRes.length > 0) cls += ' urgent';
        else cls += ' used';
      } else {
        // 예약 2개 이상 겹침
        if (dayRes.length > 1) cls += ' urgent';
        else if (dayRes.length === 1) cls += ' reserved';
        else cls += ' free';
      }

      if (isToday) cls += ' today';
      if (isWeekend) cls += ' weekend';

      // 사용 가능일 보기 모드
      if (availView) {
        const unavailable = isMaint || inUseNow || dayRes.length > 0;
        cls = 'day-cell' + (isToday ? ' today' : '') + (isWeekend ? ' weekend' : '');
        if (unavailable) {
          cls += ' maint'; // 어두운 색
        } else {
          cls = cls.replace('day-cell', 'day-cell free');
          // 더 진한 초록으로
          tbody += `<td><div class="${cls}" style="background:rgba(46,204,138,0.25);border-color:rgba(46,204,138,0.5)"></div></td>`;
          return;
        }
      }

      // 팝업 데이터
      let popupData = null;
      if (isMaint) {
        popupData = { type: 'maint', eqId: eq.id, location: eq.location, memo: eq.memo };
      } else if (inUseNow) {
        if (dayRes.length > 0) {
          const resId = dayRes.length === 1 ? dayRes[0].id : null;
          popupData = { type: 'res', resId, eqId: eq.id, items: [
            { purpose: eq.purpose, user: eq.user, location: eq.location, start: dStr, end: eq.until },
            ...dayRes.map(r => ({ purpose: r.purpose, user: r.user, location: r.location, start: r.start, end: r.end }))
          ]};
        } else {
          popupData = { type: 'use', eqId: eq.id, purpose: eq.purpose, user: eq.user, location: eq.location, until: eq.until };
        }
      } else if (dayRes.length > 0) {
        const resId = dayRes.length === 1 ? dayRes[0].id : null;
        popupData = { type: 'res', resId, eqId: eq.id, items: dayRes.map(r => ({ purpose: r.purpose, user: r.user, location: r.location, start: r.start, end: r.end })) };
      }

      // free 셀도 클릭 시 예약 추가 팝업
      if (!popupData && cls.includes('free')) {
        popupData = { type: 'free', eqId: eq.id, eqName: eq.name, category: eq.category };
      }

      const dataAttr = popupData ? `data-popup="${encodeURIComponent(JSON.stringify(popupData))}" onclick="showCellPopup(this)"` : '';

      // 셀 안 텍스트
      let cellText = '';
      if (cls.includes('urgent')) {
        const cnt = (inUseNow ? 1 : 0) + dayRes.length;
        cellText = `<span style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.95)">${cnt}</span>`;
      } else if (cls.includes('used')) {
        cellText = `<span style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.9)">${eq.user ? eq.user.slice(0,2) : ''}</span>`;
      } else if (cls.includes('reserved')) {
        const r = dayRes[0];
        cellText = r ? `<span style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.8)">${r.user ? r.user.slice(0,2) : ''}</span>` : '';
      }

      tbody += `<td><div class="${cls}" style="display:flex;align-items:center;justify-content:center" ${dataAttr}>${cellText}</div></td>`;
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';

  document.getElementById('timeline-table-wrap').innerHTML = `<table class="timeline-table" id="timeline-table">${thead + tbody}</table>`;
}

function openCatManage() {
  const cats = getAllCategories();
  document.getElementById('new-cat-input').value = '';
  document.getElementById('new-cat-is-module').checked = false;
  const list = document.getElementById('cat-manage-list');
  if (!cats.length) {
    list.innerHTML = '<div style="color:var(--gray);font-size:13px;padding:12px 0">등록된 품목이 없습니다</div>';
  } else {
    list.innerHTML = cats.map(cat => {
      const count = equipments.filter(e => e.category === cat).length;
      const isModule = categoryMeta[cat]?.isModule || false;
      return `<div class="cat-manage-row">
        <input type="text" data-original="${cat}" value="${cat}">
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);white-space:nowrap;cursor:pointer">
          <input type="checkbox" class="cat-is-module" ${isModule ? 'checked' : ''} style="cursor:pointer"> 모듈
        </label>
        <span class="eq-cnt">${count}대</span>
        <button class="btn btn-danger" style="flex:none;padding:6px 12px;font-size:12px" onclick="deleteCat('${cat}')">삭제</button>
      </div>`;
    }).join('');
  }
  document.getElementById('modal-cat-manage').classList.add('open');
}

function saveCatManage() {
  const rows = document.querySelectorAll('#cat-manage-list .cat-manage-row input[type=text]');
  const seen = new Set();
  for (const input of rows) {
    const newName = input.value.trim();
    if (!newName) { alert('품목 이름을 비워둘 수 없습니다'); return; }
    if (seen.has(newName)) { alert(`'${newName}' 이름이 중복됩니다`); return; }
    seen.add(newName);
  }
  let needSaveAll = false;
  rows.forEach((input, i) => {
    const oldName = input.dataset.original;
    const newName = input.value.trim();
    const isModule = input.closest('.cat-manage-row').querySelector('.cat-is-module').checked;
    if (oldName === '' && newName) {
      if (!extraCategories.includes(newName)) extraCategories.push(newName);
      categoryMeta[newName] = { isModule };
    } else if (oldName && oldName !== newName) {
      equipments.forEach(eq => { if (eq.category === oldName) eq.category = newName; });
      const idx = extraCategories.indexOf(oldName);
      if (idx > -1) extraCategories[idx] = newName;
      if (activeCat === oldName) activeCat = newName;
      categoryMeta[newName] = { isModule };
      delete categoryMeta[oldName];
      needSaveAll = true;
    } else if (oldName) {
      categoryMeta[oldName] = { isModule };
    }
  });
  closeModal('modal-cat-manage');
  if (needSaveAll) saveAllEquipments();
  saveToSheets('categories', { categories: getAllCategories(), categoryMeta });
  renderDashboard();
}

function deleteCat(cat) {
  const count = equipments.filter(e => e.category === cat).length;
  const msg = count > 0
    ? `'${cat}' 품목을 삭제하면 해당 장비 ${count}대의 품목이 비워집니다.`
    : `'${cat}' 품목을 삭제하시겠습니까?`;
  showConfirm('품목 삭제', msg, () => {
    equipments.forEach(eq => { if (eq.category === cat) eq.category = ''; });
    extraCategories = extraCategories.filter(c => c !== cat);
    if (activeCat === cat) activeCat = '전체';
    openCatManage();
    renderDashboard();
  });
}

function isModuleCategory(cat) {

}

function refreshMountField(selectedCat, selectedId) {
  const isModule = isModuleCategory(selectedCat);
  const isHost = selectedCat !== '' && !isModule;

  document.getElementById('mount-field').style.display = isModule ? 'block' : 'none';
  if (isModule) {
    const targets = equipments.filter(e => !isModuleCategory(e.category) && e.id !== selectedId);
    const sel = document.getElementById('eq-mounted-on');
    const cur = sel.value;
    sel.innerHTML = '<option value="">-- 미장착 --</option>'
      + targets.map(e => `<option value="${e.id}"${e.id == cur ? ' selected' : ''}>${e.category ? e.category + ' · ' : ''}${e.name}${e.serial ? ' (' + e.serial + ')' : ''}</option>`).join('');
  }

  document.getElementById('module-field').style.display = isHost ? 'block' : 'none';
  if (isHost) {
    const modules = equipments.filter(e => isModuleCategory(e.category) && e.id !== selectedId);
    const sel = document.getElementById('eq-module-on');
    const cur = sel.value;
    sel.innerHTML = '<option value="">-- 없음 --</option>'
      + modules.map(e => `<option value="${e.id}"${e.id == cur ? ' selected' : ''}>${e.category ? e.category + ' · ' : ''}${e.name}${e.serial ? ' · ' + e.serial : ''}</option>`).join('');
  }
}

function openAddEquipment() {

function saveEquipment() {
  const data = {
    category: document.getElementById('eq-category').value.trim(),
    name: document.getElementById('eq-name').value.trim(),
    version: document.getElementById('eq-version').value.trim(),
    serial: document.getElementById('eq-serial').value.trim(),
    status: document.getElementById('eq-status').value,
    location: document.getElementById('eq-location').value.trim(),
    user: document.getElementById('eq-user').value.trim(),
    until: document.getElementById('eq-until').value,
    purpose: document.getElementById('eq-purpose').value.trim(),
    memo: document.getElementById('eq-memo').value.trim(),
    mountedOn: document.getElementById('eq-category').value === 'SIRIUS V2'
      ? (document.getElementById('eq-mounted-on').value ? parseInt(document.getElementById('eq-mounted-on').value) : '') : '',
  };
  if (!data.name) { alert('장비명을 입력해주세요'); return; }
  if (!data.category) { alert('품목을 입력해주세요'); return; }

  // 모듈이면 장착 위치 저장, 아니면 장착된 모듈 양방향 업데이트
  const isModule = isModuleCategory(data.category);
  const isTarget = !isModule && data.category !== '';

  if (isModule) {
    // 모듈 장비: mountedOn을 드롭다운에서 가져옴
    data.mountedOn = document.getElementById('eq-mounted-on').value
      ? parseInt(document.getElementById('eq-mounted-on').value) : '';
  }

  if (isTarget) {
    const selectedModuleId = document.getElementById('eq-module-on').value
      ? parseInt(document.getElementById('eq-module-on').value) : '';

    // 기존에 이 장비에 연결된 모듈 모두 해제
    equipments.forEach(e => {
      if (isModuleCategory(e.category) && e.mountedOn === editingId) {
        e.mountedOn = '';
        saveToSheets('equipments', e);
      }
    });

    // 새로 선택된 모듈에 mountedOn 설정
    if (selectedModuleId) {
      const mod = equipments.find(e => e.id === selectedModuleId);
      if (mod) {
        mod.mountedOn = editingId || nextEqId;
        saveToSheets('equipments', mod);
      }
    }
  }

  if (editingId) {
    const idx = equipments.findIndex(e => e.id === editingId);
    equipments[idx] = { ...equipments[idx], ...data };
  } else {
    const newId = nextEqId++;
    if (isTarget) {
      const selectedModuleId = document.getElementById('eq-module-on').value
        ? parseInt(document.getElementById('eq-module-on').value) : '';
      if (selectedModuleId) {
        const mod = equipments.find(e => e.id === selectedModuleId);
        if (mod) { mod.mountedOn = newId; saveToSheets('equipments', mod); }
      }
    }
    equipments.push({ id: newId, ...data, mountedOn: data.mountedOn || '' });
  }

  // 모듈이고 editingId인 경우 mountedOn 반영
  if (isModule && editingId) {
    const idx = equipments.findIndex(e => e.id === editingId);
    if (idx > -1) equipments[idx].mountedOn = data.mountedOn;
  }

  closeModal('modal-equipment');
  const savedEq = editingId ? equipments.find(e=>e.id===editingId) : equipments[equipments.length-1];
  saveToSheets('equipments', savedEq);
  renderDashboard();
}

function saveReservation() {
  const user = document.getElementById('res-user').value.trim();
  const start = document.getElementById('res-start').value;
  const end = document.getElementById('res-end').value;
  const purpose = document.getElementById('res-purpose').value.trim();
  const location = document.getElementById('res-location').value.trim();
  const conflictEl = document.getElementById('res-conflict');

  if (!user || !start || !end) { alert('사용자, 시작일, 종료일을 모두 입력해주세요'); return; }
  if (start > end) { alert('종료일이 시작일보다 빠릅니다'); return; }
  if (!reservingEqId) { alert('장비를 선택해주세요'); return; }

  const eq = equipments.find(e => e.id === reservingEqId);
  if (!eq) { alert('장비를 찾을 수 없습니다'); return; }

  // 현재 사용 중과 겹치는지 — 경고만, 막지 않음
  const inUseConflict = eq.status === 'in-use' && eq.until && start <= eq.until;
  // 기존 예약과 겹치는지 — 경고만, 막지 않음
  const resConflict = reservations.find(r =>
    r.eqId === reservingEqId && r.id !== editingResId && !(end < r.start || start > r.end)
  );

  // 경고 표시 후 한 번 더 누르면 저장 (urgent 플래그)
  const isUrgent = conflictEl.dataset.warned === 'true';

  if ((inUseConflict || resConflict) && !isUrgent) {
    let msg = '⚠️ 일정이 겹칩니다!\n\n';
    if (inUseConflict) msg += `현재 ${eq.user}님이 ${eq.until}까지 사용 중\n`;
    if (resConflict) msg += `${resConflict.user}님 예약(${resConflict.start}~${resConflict.end})과 겹침\n`;
    msg += '\n긴급 일정이라면 다시 한번 저장을 눌러주세요.';
    conflictEl.textContent = msg;
    conflictEl.style.display = 'block';
    conflictEl.dataset.warned = 'true';
    return;
  }

  conflictEl.style.display = 'none';
  conflictEl.dataset.warned = '';

  const urgent = !!(inUseConflict || resConflict);

  if (editingResId) {
    const idx = reservations.findIndex(r => r.id === editingResId);
    reservations[idx] = { ...reservations[idx], user, start, end, purpose, location, urgent };
  } else {
    reservations.push({ id: nextResId++, eqId: reservingEqId, user, start, end, purpose, location, urgent });
  }

  const savedRes = editingResId ? reservations.find(r=>r.id===editingResId) : reservations[reservations.length-1];
  closeModal('modal-reserve');
  renderDashboard();
  renderCalendar();
  saveToSheets('reservations', savedRes); // 백그라운드로 시트 저장
}

  e.stopPropagation();
  const menu = document.getElementById(id);
  const isOpen = menu.classList.contains('open');
  closeDotMenus();
  if (!isOpen) menu.classList.add('open');
}
function closeDotMenus() {
  document.querySelectorAll('.dot-menu-popup.open').forEach(m => m.classList.remove('open'));
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
document.addEventListener('click', closeDotMenus);

// ── 초기화 ────────────────────────────────────────
renderDashboard();

// ── sticky filter top 동적 계산 ──────────────────────
function updateStickyFilterTop() {
  const tabs = document.querySelector('.tabs');
  const header = document.querySelector('header');
  const tabsH = tabs ? tabs.offsetHeight : 53;
  // header를 탭바 바로 아래에 붙임
  if (header) header.style.top = tabsH + 'px';
  const headerH = header ? header.offsetHeight : 40;
  const topVal = (tabsH + headerH) + 'px';
  document.querySelectorAll('.dashboard-sticky-filter, .timeline-sticky-filter, .history-sticky-filter').forEach(el => {
    el.style.top = topVal;
  });
}
updateStickyFilterTop();
window.addEventListener('resize', updateStickyFilterTop);

loadFromSheets();

let lastSaveTime = 0;

// 3분마다 자동 갱신 (페이지 열려있을 때만, 저장 직후 30초는 제외)
setInterval(() => {
  if (!document.hidden && Date.now() - lastSaveTime > 30000) loadFromSheets(true);
}, 3 * 60 * 1000);
</script>
</body>
</html>
